name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build (debug)
        run: swift build

      - name: Test
        run: swift test

      - name: Build universal release .app (smoke)
        env:
          VERSION: ci-${{ github.sha }}
        run: ./scripts/build-app.sh
